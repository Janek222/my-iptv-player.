<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>IPTV_FORK</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0a; --panel: #151515; --text: #fff; --accent: #00d4ff;
      --error: #ff4444; --success: #00ff88;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column;
    }
    .header {
      padding: 15px 24px; background: var(--panel);
      border-bottom: 2px solid var(--accent);
      display: flex; justify-content: space-between; align-items: center;
    }
    .title { font-size: 20px; font-weight: bold; color: var(--accent); }
    .stats { font-size: 12px; display: flex; gap: 20px; }
    .stats span { color: var(--accent); }
    
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 350px; background: var(--panel);
      border-right: 1px solid #333; display: flex; flex-direction: column;
    }
    
    .search-box { padding: 15px; border-bottom: 1px solid #333; }
    .search-box input {
      width: 100%; padding: 10px; background: var(--bg);
      border: 1px solid #333; border-radius: 6px; color: white; font-size: 14px;
    }
    
    .channel-list { flex: 1; overflow-y: auto; padding: 8px; }
    .channel {
      padding: 12px; margin: 4px 0; border-radius: 6px;
      cursor: pointer; display: flex; align-items: center; gap: 10px;
      border: 2px solid transparent;
    }
    .channel:hover { background: #1e1e1e; }
    .channel.focused { border-color: var(--accent); background: rgba(0, 212, 255, 0.1); }
    .channel.active { border-color: var(--accent); background: rgba(0, 212, 255, 0.2); }
    .channel-logo { width: 40px; height: 40px; border-radius: 6px; background: #333; }
    .channel-name { font-size: 14px; font-weight: 600; }
    .channel-epg { font-size: 11px; color: #888; margin-top: 3px; }
    
    .player {
      flex: 1; background: #000; display: flex;
      align-items: center; justify-content: center; position: relative;
    }
    video { width: 100%; height: 100%; }
    
    .info {
      position: absolute; top: 20px; left: 20px;
      background: rgba(0,0,0,0.8); padding: 15px;
      border-radius: 8px; font-size: 13px;
    }
    .info-item { margin: 5px 0; }
    .ok { color: var(--success); }
    .error { color: var(--error); }
    
    .controls {
      position: absolute; bottom: 30px; left: 50%;
      transform: translateX(-50%); display: flex; gap: 15px;
    }
    .btn {
      padding: 10px 20px; background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3); border-radius: 8px;
      color: white; cursor: pointer; font-size: 14px;
    }
    .btn:hover { background: var(--accent); color: black; border-color: var(--accent); }
    
    .notice {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 100, 0, 0.9);
      padding: 30px; border-radius: 10px;
      text-align: center; display: none;
    }
    .notice.show { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">📺 IPTV_FORK</div>
    <div class="stats">
      <div>Каналов: <span id="chCount">0</span></div>
      <div>EPG: <span id="epgStatus">—</span></div>
      <div>Прокси: <span id="proxyStatus">OFF</span></div>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="search-box">
        <input type="text" id="search" placeholder="🔍 Поиск каналов...">
      </div>
      <div class="channel-list" id="list"></div>
    </div>

    <div class="player" id="player">
      <video id="video" controls autoplay playsinline></video>
      
      <div class="info" id="info">
        <div class="info-item">📡 Загрузка...</div>
      </div>

      <div class="notice" id="notice">
        <h3 style="margin-bottom:15px">🔧 Решение Mixed Content</h3>
        <p style="margin-bottom:15px; font-size:13px; color:#ccc">
          Потоки HTTP не работают на HTTPS сайте.<br><br>
          <strong>Выберите решение:</strong>
        </p>
        <button class="btn" onclick="enableProxy()" style="margin:5px">
          ✅ Включить HTTPS прокси
        </button>
        <button class="btn" onclick="closeNotice()" style="margin:5px">
          ❌ Закрыть
        </button>
      </div>

      <div class="controls">
        <button class="btn" onclick="toggleProxy()">🔄 Прокси: <span id="proxyBtn">OFF</span></button>
        <button class="btn" onclick="testStream()">🧪 Тест</button>
      </div>
    </div>
  </div>

<script>
  const CONFIG = {
    playlist: 'https://skaz.tv/play/82866376f',
    epg: 'http://skaztv.online/epg6.xml.gz',
    // Прокси для конвертации HTTP → HTTPS
    proxy: 'https://api.allorigins.win/raw?url='
  };

  let state = {
    channels: [],
    epg: {},
    focused: 0,
    current: null,
    hls: null,
    useProxy: false  // По умолчанию выключен
  };

  const els = {
    list: document.getElementById('list'),
    video: document.getElementById('video'),
    info: document.getElementById('info'),
    search: document.getElementById('search'),
    chCount: document.getElementById('chCount'),
    epgStatus: document.getElementById('epgStatus'),
    proxyStatus: document.getElementById('proxyStatus'),
    proxyBtn: document.getElementById('proxyBtn'),
    notice: document.getElementById('notice')
  };

  window.addEventListener('load', () => {
    updateInfo('📥 Загрузка плейлиста...');
    loadPlaylist();
    loadEPG();
    
    els.search.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = state.channels.filter(ch => ch.name.toLowerCase().includes(term));
      renderChannels(filtered);
    });

    document.addEventListener('keydown', (e) => {
      if (e.keyCode === 38 && state.focused > 0) {
        state.focused--; renderChannels(getFiltered());
      } else if (e.keyCode === 40 && state.focused < state.channels.length - 1) {
        state.focused++; renderChannels(getFiltered());
      } else if (e.keyCode === 13) {
        const ch = getFiltered()[state.focused];
        if (ch) playChannel(ch);
      }
    });

    // Показываем уведомление о Mixed Content
    setTimeout(() => {
      els.notice.classList.add('show');
    }, 2000);
  });

  function enableProxy() {
    state.useProxy = true;
    updateProxyUI();
    closeNotice();
    updateInfo('✅ Прокси включен. Перезагрузка плейлиста...');
    setTimeout(() => loadPlaylist(), 500);
  }

  function closeNotice() {
    els.notice.classList.remove('show');
  }

  function toggleProxy() {
    state.useProxy = !state.useProxy;
    updateProxyUI();
    updateInfo(state.useProxy ? '✅ Прокси включен' : '❌ Прокси выключен');
    setTimeout(() => loadPlaylist(), 500);
  }

  function updateProxyUI() {
    els.proxyStatus.textContent = state.useProxy ? 'ON' : 'OFF';
    els.proxyStatus.className = state.useProxy ? 'ok' : 'error';
    els.proxyBtn.textContent = state.useProxy ? 'ON' : 'OFF';
    els.proxyBtn.style.color = state.useProxy ? 'var(--success)' : 'var(--error)';
  }

  function proxyUrl(url) {
    if (!state.useProxy) return url;
    // Добавляем прокси только для HTTP URL
    if (url.startsWith('http://')) {
      return CONFIG.proxy + encodeURIComponent(url);
    }
    return url;
  }

  async function loadPlaylist() {
    try {
      const url = proxyUrl(CONFIG.playlist);
      console.log('Loading playlist:', url);
      
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const text = await response.text();
      state.channels = parseM3U(text);
      
      els.chCount.textContent = state.channels.length;
      renderChannels(state.channels);
      updateInfo(`✅ Загружено ${state.channels.length} каналов`);
      
      if (state.channels.length > 0) {
        setTimeout(() => playChannel(state.channels[0]), 1000);
      }
    } catch (error) {
      console.error('Error:', error);
      updateInfo('❌ Ошибка загрузки плейлиста');
      alert(`Ошибка: ${error.message}\n\nПопробуйте включить прокси!`);
    }
  }

  function parseM3U(text) {
    const channels = [];
    let current = {};
    
    for (let line of text.split('\n')) {
      line = line.trim();
      if (!line) continue;
      
      if (line.startsWith('#EXTINF:')) {
        const comma = line.lastIndexOf(',');
        current.name = comma > -1 ? line.substring(comma + 1).trim() : 'Без названия';
        const logo = line.match(/tvg-logo="([^"]*)"/i);
        const id = line.match(/tvg-id="([^"]*)"/i);
        if (logo) current.logo = logo[1];
        if (id) current.tvg_id = id[1];
      } else if (line.startsWith('http')) {
        current.url = line;
        channels.push({...current});
        current = {};
      }
    }
    return channels;
  }

  async function loadEPG() {
    try {
      const url = proxyUrl(CONFIG.epg);
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const buffer = await response.arrayBuffer();
      const decompressed = pako.inflate(buffer, {to: 'string'});
      state.epg = parseXMLTV(decompressed);
      
      els.epgStatus.textContent = `✅ ${Object.keys(state.epg).length}`;
    } catch (error) {
      console.error('EPG error:', error);
      els.epgStatus.textContent = '❌ Ошибка';
    }
  }

  function parseXMLTV(xml) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');
    const result = {};
    
    doc.querySelectorAll('channel').forEach(ch => {
      const id = ch.getAttribute('id');
      if (id) result[id] = { programs: [] };
    });
    
    doc.querySelectorAll('programme').forEach(prog => {
      const channelId = prog.getAttribute('channel');
      if (!result[channelId]) return;
      
      const start = parseDate(prog.getAttribute('start'));
      const stop = parseDate(prog.getAttribute('stop'));
      const title = prog.querySelector('title')?.textContent || '';
      
      result[channelId].programs.push({ start, stop, title });
    });
    
    return result;
  }

  function parseDate(dateStr) {
    if (!dateStr) return 0;
    const y = dateStr.slice(0,4), m = dateStr.slice(4,6)-1, d = dateStr.slice(6,8);
    const H = dateStr.slice(8,10), M = dateStr.slice(10,12);
    return new Date(y, m, d, H, M).getTime();
  }

  function playChannel(ch) {
    state.current = ch;
    console.log('Playing:', ch.name, ch.url);
    
    updateInfo(`▶ ${ch.name}`);
    
    if (state.hls) {
      state.hls.destroy();
      state.hls = null;
    }
    els.video.pause();
    els.video.src = '';
    
    setTimeout(() => {
      const streamUrl = proxyUrl(ch.url);
      console.log('Stream URL:', streamUrl);
      tryPlay(streamUrl);
    }, 100);
    
    document.querySelectorAll('.channel').forEach((el, i) => {
      el.classList.toggle('active', getFiltered()[i] === ch);
    });
  }

  function tryPlay(url) {
    if (Hls.isSupported()) {
      state.hls = new Hls({ enableWorker: true });
      state.hls.loadSource(url);
      state.hls.attachMedia(els.video);
      
      state.hls.on(Hls.Events.MANIFEST_PARSED, () => {
        console.log('Manifest parsed');
        els.video.play().catch(err => console.warn('Autoplay blocked:', err));
        updateInfo(`▶ ${state.current.name} (Прокси: ${state.useProxy ? 'ON' : 'OFF'})`);
      });
      
      state.hls.on(Hls.Events.ERROR, (event, data) => {
        console.error('HLS error:', data);
        if (data.fatal) {
          updateInfo('❌ Ошибка потока');
          if (!state.useProxy && url.startsWith('http://')) {
            setTimeout(() => {
              if (confirm('Включить HTTPS прокси для этого потока?')) {
                enableProxy();
              }
            }, 500);
          }
        }
      });
    } else if (els.video.canPlayType('application/vnd.apple.mpegurl')) {
      els.video.src = url;
      els.video.play().catch(err => console.warn('Play error:', err));
    }
    
    els.video.onerror = () => {
      console.error('Video error');
      updateInfo('❌ Ошибка воспроизведения');
    };
  }

  function getFiltered() {
    const term = els.search.value.toLowerCase();
    return term 
      ? state.channels.filter(ch => ch.name.toLowerCase().includes(term))
      : state.channels;
  }

  function renderChannels(channels) {
    els.list.innerHTML = '';
    const filtered = getFiltered();
    
    channels.forEach((ch, idx) => {
      const div = document.createElement('div');
      div.className = 'channel';
      if (idx === state.focused) div.classList.add('focused');
      
      const epgCh = ch.tvg_id ? state.epg[ch.tvg_id] : null;
      const now = Date.now();
      const currentProg = epgCh?.programs?.find(p => now >= p.start && now < p.stop);
      
      div.innerHTML = `
        <img class="channel-logo" src="${ch.logo || 'https://via.placeholder.com/40'}" onerror="this.style.display='none'">
        <div style="flex:1">
          <div class="channel-name">${ch.name}</div>
          ${currentProg ? `<div class="channel-epg">${currentProg.title}</div>` : ''}
        </div>
      `;
      
      div.onclick = () => {
        state.focused = idx;
        playChannel(ch);
      };
      
      els.list.appendChild(div);
    });
  }

  function updateInfo(msg) {
    els.info.innerHTML = `<div class="info-item ${msg.includes('❌') ? 'error' : msg.includes('✅') ? 'ok' : ''}">${msg}</div>`;
  }

  async function testStream() {
    if (!state.current) {
      alert('Выберите канал сначала');
      return;
    }
    
    const url = state.current.url;
    const proxiedUrl = proxyUrl(url);
    
    try {
      updateInfo('🧪 Тестирование...');
      const response = await fetch(proxiedUrl, { method: 'HEAD' });
      alert(`✅ Поток доступен!\n\nURL: ${url}\nПрокси: ${state.useProxy ? 'ON' : 'OFF'}\nStatus: ${response.status}`);
      updateInfo('✅ Тест пройден');
    } catch (error) {
      alert(`❌ Ошибка теста:\n${error.message}\n\nПопробуйте ${state.useProxy ? 'выключить' : 'включить'} прокси`);
      updateInfo('❌ Тест не пройден');
    }
  }
</script>
</body>
</html>
