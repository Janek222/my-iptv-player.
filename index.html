<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>IPTV GitHub Player</title>
  <!-- Библиотека для воспроизведения HLS (.m3u8) -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #00a8ff; --hover: #333; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
    
    /* Боковая панель */
    .sidebar { width: 300px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #333; }
    .input-area { padding: 15px; border-bottom: 1px solid #333; }
    input { width: 100%; padding: 8px; margin-bottom: 8px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: var(--accent); border: none; color: white; cursor: pointer; font-weight: bold; border-radius: 4px; }
    button:hover { opacity: 0.9; }
    
    /* Список каналов */
    .list { flex: 1; overflow-y: auto; padding: 10px; }
    .channel { padding: 10px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
    .channel:hover, .channel.active { background: var(--accent); color: #000; }
    .logo { width: 40px; height: 40px; border-radius: 4px; background: #333; object-fit: cover; }
    .name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Плеер */
    .player-area { flex: 1; display: flex; align-items: center; justify-content: center; background: black; position: relative; }
    video { width: 100%; height: 100%; max-height: 100vh; }
    .status { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; color: white; }
    .error { color: #ff6b6b; background: rgba(50,0,0,0.8); padding: 20px; border-radius: 10px; display: none; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="input-area">
      <input type="text" id="m3uUrl" placeholder="Вставьте ссылку на .m3u" value="https://iptv-org.github.io/iptv/countries/ru.m3u">
      <button onclick="loadPlaylist()">Загрузить плейлист</button>
    </div>
    <div class="list" id="channelList">
      <div style="padding:20px; color:#666; text-align:center;">Список пуст</div>
    </div>
  </div>

  <div class="player-area">
    <video id="video" controls playsinline></video>
    <div class="status" id="status">Готов к воспроизведению</div>
    <div class="error" id="error"></div>
  </div>

<script>
  let hls = null;
  const video = document.getElementById('video');
  
  async function loadPlaylist() {
    const url = document.getElementById('m3uUrl').value;
    const listEl = document.getElementById('channelList');
    const statusEl = document.getElementById('status');
    
    if (!url) return alert('Введите ссылку!');
    
    statusEl.textContent = 'Загрузка...';
    listEl.innerHTML = '<div style="padding:20px;text-align:center;">Загрузка...</div>';

    try {
      // Загружаем плейлист
      const response = await fetch(url);
      if (!response.ok) throw new Error('Ошибка сети');
      const text = await response.text();
      
      const channels = parseM3U(text);
      renderChannels(channels);
      statusEl.textContent = `Загружено каналов: ${channels.length}`;
    } catch (e) {
      statusEl.textContent = 'Ошибка';
      listEl.innerHTML = `<div style="padding:20px; color:red;">Ошибка: ${e.message}<br><br>Возможно, ссылка плейлиста недоступна из-за CORS.</div>`;
    }
  }

  function parseM3U(text) {
    const lines = text.split('\n');
    const channels = [];
    let current = {};

    for (let line of lines) {
      line = line.trim();
      if (line.startsWith('#EXTINF:')) {
        // Парсинг названия и логотипа
        const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
        const nameMatch = line.match(/,(.*)$/);
        current.name = nameMatch ? nameMatch[1] : 'Без названия';
        current.logo = logoMatch ? logoMatch[1] : '';
      } else if (line.startsWith('http')) {
        current.url = line;
        channels.push({ ...current });
        current = {};
      }
    }
    return channels;
    }

  function renderChannels(channels) {
    const listEl = document.getElementById('channelList');
    listEl.innerHTML = '';
    
    channels.forEach(ch => {
      const div = document.createElement('div');
      div.className = 'channel';
      div.innerHTML = `
        <img class="logo" src="${ch.logo || 'https://via.placeholder.com/40'}" onerror="this.src='https://via.placeholder.com/40'">
        <div class="name">${ch.name}</div>
      `;
      div.onclick = () => playChannel(ch.url, ch.name, div);
      listEl.appendChild(div);
    });
  }

  function playChannel(url, name, element) {
    // UI
    document.querySelectorAll('.channel').forEach(el => el.classList.remove('active'));
    element.classList.add('active');
    document.getElementById('status').textContent = `▶ ${name}`;
    
    // Логика плеера
    if (Hls.isSupported()) {
      if (hls) hls.destroy();
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play();
    }
  }

  // Загрузить тестовый плейлист при старте
  window.onload = loadPlaylist;
</script>
</body>
</html>
