<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>IPTV_FORK</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      padding: 15px 24px; background: #151515; border-bottom: 2px solid #00d4ff;
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    .title { font-size: 20px; font-weight: bold; color: #00d4ff; }
    .stats { font-size: 12px; display: flex; gap: 20px; }
    .stats span { color: #00d4ff; }
    
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 400px; background: #151515; border-right: 1px solid #333;
      display: flex; flex-direction: column;
    }
    .search { padding: 15px; border-bottom: 1px solid #333; }
    .search input {
      width: 100%; padding: 10px; background: #0a0a0a;
      border: 1px solid #333; border-radius: 6px; color: white; font-size: 14px;
    }
    .list { flex: 1; overflow-y: auto; padding: 8px; }
    .channel {
      padding: 12px; margin: 4px 0; border-radius: 6px;
      cursor: pointer; display: flex; align-items: center; gap: 12px;
      border: 2px solid transparent;
    }
    .channel:hover { background: #1e1e1e; }
    .channel.focused { border-color: #00d4ff; background: rgba(0, 212, 255, 0.1); }
    .channel.active { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }
    .logo { width: 44px; height: 44px; border-radius: 6px; background: #222; }
    .ch-name { font-size: 15px; font-weight: 600; }
    .ch-epg { font-size: 12px; color: #888; margin-top: 3px; }
    
    .player {
      flex: 1; background: #000; display: flex;
      align-items: center; justify-content: center; position: relative;
    }
    video { width: 100%; height: 100%; }
    
    .info {
      position: absolute; top: 20px; left: 20px;
      background: rgba(0,0,0,0.8); padding: 15px;
      border-radius: 8px; font-size: 14px;
    }
    .ok { color: #00ff88; }
    .error { color: #ff4444; }
    .warn { color: #ffa500; }
    
    .epg-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 8px;
      font-size: 13px;
      max-width: 350px;
      display: none;
    }
    .epg-panel.show { display: block; }
    .epg-title { font-weight: bold; color: #00d4ff; margin-bottom: 8px; }
    .epg-now { color: #fff; margin-bottom: 5px; }
    .epg-next { color: #888; margin-bottom: 8px; }
    .epg-progress { height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
    .epg-bar { height: 100%; background: #00d4ff; width: 0%; transition: width 0.5s; }
    
    .controls {
      position: absolute; bottom: 30px; left: 50%;
      transform: translateX(-50%); display: flex; gap: 15px;
    }
    .btn {
      padding: 10px 20px; background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3); border-radius: 8px;
      color: white; cursor: pointer; font-size: 14px;
    }
    .btn:hover { background: #00d4ff; border-color: #00d4ff; color: black; }
    
    .hint {
      position: absolute; bottom: 20px; right: 20px;
      font-size: 12px; color: #888; background: rgba(0,0,0,0.6);
      padding: 8px 12px; border-radius: 6px;
    }
    
    .alert {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(80, 40, 0, 0.95);
      border: 2px solid #ffa500;
      padding: 25px; border-radius: 12px;
      text-align: center; display: none; max-width: 450px;
    }
    .alert.show { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">📺 IPTV_FORK</div>
    <div class="stats">
      <div>Каналов: <span id="chCount">0</span></div>
      <div>EPG: <span id="epgStatus">Загрузка...</span></div>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="search">
        <input type="text" id="search" placeholder="🔍 Поиск каналов...">
      </div>
      <div class="list" id="list"></div>
    </div>

    <div class="player">
      <video id="video" controls autoplay playsinline></video>
      
      <div class="info" id="info">
        <div class="warn">📡 Загрузка плейлиста...</div>
      </div>

      <div class="epg-panel" id="epgPanel">
        <div class="epg-title" id="epgChannel">—</div>
        <div class="epg-now" id="epgNow">Загрузка...</div>
        <div class="epg-next" id="epgNext">Далее: —</div>
        <div class="epg-progress"><div class="epg-bar" id="epgBar"></div></div>
      </div>

      <div class="controls">
        <button class="btn" onclick="openInNewTab()">📺 Открыть в новой вкладке</button>
        <button class="btn" onclick="location.reload()">🔄 Обновить</button>
      </div>

      <div class="hint">↑↓ Навигация | OK ▶ | Назад ↩</div>

      <div class="alert" id="alert">
        <h3 style="margin-bottom:15px; color:#ffa500">⚠️ Браузер блокирует поток</h3>
        <p style="margin-bottom:15px; font-size:13px; color:#ddd; line-height:1.5">
          HTTPS сайт не может загружать HTTP потоки.<br><br>
          <b>Решение:</b> нажмите «Открыть в новой вкладке»
        </p>
        <button class="btn" onclick="closeAlert()">Закрыть</button>
      </div>
    </div>
  </div>

<script>
  const PLAYLIST_URL = 'https://skaz.tv/play/82866376f';
  const EPG_URL = 'http://skaztv.online/epg6.xml.gz';
  
  let channels = [];
  let epg = {};
  let focused = 0;
  let current = null;
  let hls = null;

  const els = {
    list: document.getElementById('list'),
    video: document.getElementById('video'),
    info: document.getElementById('info'),
    search: document.getElementById('search'),
    chCount: document.getElementById('chCount'),
    epgStatus: document.getElementById('epgStatus'),
    epgPanel: document.getElementById('epgPanel'),
    epgChannel: document.getElementById('epgChannel'),
    epgNow: document.getElementById('epgNow'),
    epgNext: document.getElementById('epgNext'),
    epgBar: document.getElementById('epgBar'),
    alert: document.getElementById('alert')
  };

  window.addEventListener('load', () => {
    loadPlaylist();
    loadEPG();
    
    els.search.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      render(channels.filter(ch => ch.name.toLowerCase().includes(term)));
    });

    document.addEventListener('keydown', (e) => {
      if (e.keyCode === 38 && focused > 0) { focused--; render(getFiltered()); }
      else if (e.keyCode === 40 && focused < channels.length - 1) { focused++; render(getFiltered()); }
      else if (e.keyCode === 13) { play(channels[focused]); }
    });
  });

  async function loadPlaylist() {
    try {
      const res = await fetch(PLAYLIST_URL);
      const text = await res.text();
      channels = parseM3U(text);
      els.chCount.textContent = channels.length;
      render(channels);
      showInfo(`✅ Загружено каналов: ${channels.length}`, 'ok');
      
      if (channels.length > 0) {
        setTimeout(() => play(channels[0]), 1500);
      }
    } catch (err) {
      showInfo('❌ Ошибка загрузки плейлиста', 'error');
    }
  }

  function parseM3U(text) {
    const chs = []; let cur = {};
    for (let line of text.split('\n')) {
      line = line.trim();
      if (!line) continue;
      if (line.startsWith('#EXTINF:')) {
        const comma = line.lastIndexOf(',');
        cur.name = comma > -1 ? line.substring(comma + 1).trim() : 'Без названия';
        const logo = line.match(/tvg-logo="([^"]*)"/i);
        const id = line.match(/tvg-id="([^"]*)"/i);
        if (logo) cur.logo = logo[1];
        if (id) cur.tvg_id = id[1];
      } else if (line.startsWith('http')) {
        cur.url = line;
        chs.push({...cur});
        cur = {};
      }
    }
    return chs;
  }

  async function loadEPG() {
    try {
      const res = await fetch(EPG_URL);
      const buffer = await res.arrayBuffer();
      const xml = pako.inflate(buffer, {to: 'string'});
      epg = parseXMLTV(xml);
      els.epgStatus.textContent = `✅ ${Object.keys(epg).length}`;
      updateEPG();
    } catch (err) {
      console.log('EPG error:', err);
      els.epgStatus.textContent = '❌ Ошибка';
    }
  }

  function parseXMLTV(xml) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const res = {};
    doc.querySelectorAll('channel').forEach(ch => {
      const id = ch.getAttribute('id');
      if (id) res[id] = { progs: [] };
    });
    doc.querySelectorAll('programme').forEach(p => {
      const id = p.getAttribute('channel');
      if (!res[id]) return;
      const start = parseDate(p.getAttribute('start'));
      const stop = parseDate(p.getAttribute('stop'));
      const title = p.querySelector('title')?.textContent || '';
      res[id].progs.push({ start, stop, title });
    });
    return res;
  }

  function parseDate(str) {
    if (!str) return 0;
    return new Date(str.slice(0,4), str.slice(4,6)-1, str.slice(6,8), str.slice(8,10), str.slice(10,12)).getTime();
  }

  function getFiltered() {
    const term = els.search.value.toLowerCase();
    return term ? channels.filter(ch => ch.name.toLowerCase().includes(term)) : channels;
  }

  function render(chs) {
    els.list.innerHTML = '';
    const filtered = getFiltered();
    
    chs.forEach((ch, i) => {
      const div = document.createElement('div');
      div.className = 'channel';
      if (ch === current) div.classList.add('active');
      if (ch === filtered[focused]) div.classList.add('focused');
      
      const epgCh = ch.tvg_id ? epg[ch.tvg_id] : null;
      const now = Date.now();
      const prog = epgCh?.progs?.find(p => now >= p.start && now < p.stop);
      
      div.innerHTML = `
        <img class="logo" src="${ch.logo||'https://via.placeholder.com/44'}" onerror="this.style.display='none'">
        <div style="flex:1;min-width:0">
          <div class="ch-name">${ch.name}</div>
          ${prog ? `<div class="ch-epg">${prog.title}</div>` : '<div class="ch-epg">Нет данных</div>'}
        </div>
      `;
      div.onclick = () => {
        focused = chs.indexOf(ch);
        play(ch);
      };
      els.list.appendChild(div);
    });
  }

  function play(ch) {
    current = ch;
    showInfo(`▶ ${ch.name}`, 'ok');
    els.epgPanel.classList.add('show');
    els.epgChannel.textContent = ch.name;
    updateEPG();
    
    if (hls) { hls.destroy(); hls = null; }
    els.video.pause();
    els.video.src = '';
    els.video.load();
    
    setTimeout(() => {
      tryPlay(ch.url);
    }, 100);
  }

  function tryPlay(url) {
    if (Hls.isSupported()) {
      hls = new Hls({ enableWorker: true });
      hls.loadSource(url);
      hls.attachMedia(els.video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        els.video.play().catch(()=>{});
      });
      hls.on(Hls.Events.ERROR, (e, data) => {
        if (data.fatal) {
          showInfo('❌ Ошибка потока', 'error');
          els.alert.classList.add('show');
        }
      });
    } else if (els.video.canPlayType('application/vnd.apple.mpegurl')) {
      els.video.src = url;
      els.video.play().catch(()=>{});
    } else {
      els.video.src = url;
      els.video.play().catch(()=>{});
    }
    
    els.video.onerror = () => {
      showInfo('❌ Ошибка воспроизведения', 'error');
      els.alert.classList.add('show');
    };
  }

  function updateEPG() {
    if (!current) return;
    const epgCh = current.tvg_id ? epg[current.tvg_id] : null;
    if (!epgCh?.progs?.length) {
      els.epgNow.textContent = 'Программа недоступна';
      els.epgNext.textContent = 'Далее: —';
      els.epgBar.style.width = '0%';
      return;
    }
    const now = Date.now();
    const currentProg = epgCh.progs.find(p => now >= p.start && now < p.stop);
    const nextProg = epgCh.progs.find(p => p.start > now);
    
    if (currentProg) {
      els.epgNow.textContent = `Сейчас: ${currentProg.title}`;
      els.epgNext.textContent = `Далее: ${nextProg?.title || '—'}`;
      const dur = currentProg.stop - currentProg.start;
      const elap = now - currentProg.start;
      els.epgBar.style.width = `${Math.min(100, (elap/dur)*100)}%`;
    } else {
      els.epgNow.textContent = 'Сейчас: —';
      els.epgNext.textContent = nextProg ? `Далее: ${nextProg.title}` : 'Далее: —';
      els.epgBar.style.width = '0%';
    }
  }

  function openInNewTab() {
    if (current) {
      window.open(current.url, '_blank');
    } else {
      alert('Сначала выберите канал');
    }
  }

  function closeAlert() {
    els.alert.classList.remove('show');
  }

  function showInfo(msg, type) {
    els.info.innerHTML = `<div class="${type}">${msg}</div>`;
  }

  // Обновляем EPG каждую минуту
  setInterval(updateEPG, 60000);
</script>
</body>
</html>
