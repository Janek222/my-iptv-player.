<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>IPTV Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { background: #121212; color: white; font-family: Arial; margin: 0; display: flex; height: 100vh; }
    .sidebar { width: 300px; background: #1e1e1e; border-right: 1px solid #333; display: flex; flex-direction: column; }
    .input-area { padding: 15px; border-bottom: 1px solid #333; }
    input { width: 100%; padding: 10px; margin-bottom: 10px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #00a8ff; border: none; color: white; cursor: pointer; font-weight: bold; border-radius: 4px; }
    .list { flex: 1; overflow-y: auto; }
    .channel { padding: 12px; cursor: pointer; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
    .channel:hover, .channel.active { background: #00a8ff; color: black; }
    .logo { width: 40px; height: 40px; border-radius: 4px; background: #333; }
    .player { flex: 1; background: black; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="input-area">
      <input type="text" id="url" placeholder="https://example.com/playlist.m3u">
      <button onclick="load()">Загрузить</button>
    </div>
    <div class="list" id="list"></div>
  </div>
  <div class="player">
    <video id="video" controls autoplay></video>
  </div>
<script>
async function load() {
  const url = document.getElementById('url').value;
  if (!url) return alert('Введите URL плейлиста');
  const res = await fetch(url);
  const text = await res.text();
  const channels = parseM3U(text);
  render(channels);
}

function parseM3U(text) {
  const channels = [];
  let current = {};
  for (let line of text.split('\n')) {
    line = line.trim();
    if (line.startsWith('#EXTINF:')) {
      const m = line.match(/,(.*)$/);
      current.name = m ? m[1] : 'Channel';
      const logo = line.match(/tvg-logo="([^"]*)"/);
      if (logo) current.logo = logo[1];
    } else if (line.startsWith('http')) {
      current.url = line;
      channels.push({...current});
      current = {};
    }
  }
  return channels;
}

function render(channels) {
  const list = document.getElementById('list');
  list.innerHTML = '';
  channels.forEach(ch => {
    const div = document.createElement('div');
    div.className = 'channel';
    div.innerHTML = `<img class="logo" src="${ch.logo||'https://via.placeholder.com/40'}"><div>${ch.name||'Channel'}</div>`;
    div.onclick = () => play(ch.url, div);
    list.appendChild(div);
  });
}

function play(url, el) {
  document.querySelectorAll('.channel').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  const video = document.getElementById('video');
  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
  } else {
    video.src = url;
    video.play();
  }
}
</script>
</body>
</html>
