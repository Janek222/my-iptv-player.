<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>IPTV_FORK</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #151515;
      --panel-light: #1e1e1e;
      --text: #ffffff;
      --text-dim: #888888;
      --accent: #00d4ff;
      --error: #ff4444;
      --success: #00ff88;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 15px 24px;
      background: var(--panel);
      border-bottom: 2px solid var(--accent);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .title { font-size: 20px; font-weight: bold; color: var(--accent); }
    .stats { font-size: 12px; color: var(--text-dim); display: flex; gap: 20px; }
    .stats span { color: var(--accent); }
    
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 350px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; }
    
    .search-box { padding: 15px; border-bottom: 1px solid #333; }
    .search-box input {
      width: 100%;
      padding: 10px;
      background: var(--bg);
      border: 1px solid #333;
      border-radius: 6px;
      color: white;
      font-size: 14px;
    }
    
    .channel-list { flex: 1; overflow-y: auto; padding: 8px; }
    .channel {
      padding: 12px;
      margin: 4px 0;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 2px solid transparent;
    }
    .channel:hover { background: var(--panel-light); }
    .channel.focused { border-color: var(--accent); background: rgba(0, 212, 255, 0.1); }
    .channel.active { border-color: var(--accent); background: rgba(0, 212, 255, 0.2); }
    .channel-logo { width: 40px; height: 40px; border-radius: 6px; background: #333; }
    .channel-name { font-size: 14px; font-weight: 600; }
    .channel-epg { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
    
    .player { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
    video { width: 100%; height: 100%; max-height: 100vh; }
    
    .status {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 8px;
      font-size: 13px;
      max-width: 400px;
    }
    .status-item { margin: 5px 0; display: flex; align-items: center; gap: 8px; }
    .status-ok { color: var(--success); }
    .status-error { color: var(--error); }
    .status-warn { color: #ffa500; }
    
    .error-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(50, 0, 0, 0.9);
      border: 2px solid var(--error);
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      display: none;
    }
    .error-box.show { display: block; }
    .error-icon { font-size: 48px; margin-bottom: 15px; }
    .error-title { font-size: 18px; margin-bottom: 10px; color: var(--error); }
    .error-text { font-size: 13px; color: var(--text-dim); margin: 10px 0; }
    .error-code { 
      background: rgba(0,0,0,0.5); 
      padding: 10px; 
      border-radius: 4px; 
      font-family: monospace; 
      font-size: 11px; 
      margin: 10px 0;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
    }
    .btn {
      padding: 10px 20px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    .btn:hover { background: var(--accent); border-color: var(--accent); color: black; }
    
    .debug-info {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 11px;
      color: var(--text-dim);
      background: rgba(0,0,0,0.6);
      padding: 5px 10px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">📺 IPTV_FORK</div>
    <div class="stats">
      <div>Каналов: <span id="chCount">0</span></div>
      <div>EPG: <span id="epgStatus">—</span></div>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="search-box">
        <input type="text" id="search" placeholder="🔍 Поиск каналов...">
      </div>
      <div class="channel-list" id="list"></div>
    </div>

    <div class="player" id="player">
      <video id="video" controls autoplay playsinline></video>
      
      <div class="status" id="status">
        <div class="status-item">📡 Загрузка...</div>
      </div>

      <div class="error-box" id="errorBox">
        <div class="error-icon">📺</div>
        <div class="error-title" id="errorTitle">Ошибка воспроизведения</div>
        <div class="error-text" id="errorText"></div>
        <div class="error-code" id="errorCode"></div>
        <button class="btn" onclick="closeError()" style="margin-top:15px">Закрыть</button>
      </div>

      <div class="controls">
        <button class="btn" onclick="testPlaylist()">🔄 Тест потока</button>
        <button class="btn" onclick="toggleDebug()">🐛 Debug</button>
      </div>

      <div class="debug-info" id="debugInfo" style="display:none"></div>
    </div>
  </div>

<script>
  const CONFIG = {
    playlist: 'https://skaz.tv/play/82866376f',
    epg: 'http://skaztv.online/epg6.xml.gz'
  };

  let state = {
    channels: [],
    epg: {},
    focused: 0,
    current: null,
    hls: null,
    debug: false
  };

  const els = {
    list: document.getElementById('list'),
    video: document.getElementById('video'),
    status: document.getElementById('status'),
    errorBox: document.getElementById('errorBox'),
    errorTitle: document.getElementById('errorTitle'),
    errorText: document.getElementById('errorText'),
    errorCode: document.getElementById('errorCode'),
    search: document.getElementById('search'),
    chCount: document.getElementById('chCount'),
    epgStatus: document.getElementById('epgStatus'),
    debugInfo: document.getElementById('debugInfo')
  };

  window.addEventListener('load', () => {
    updateStatus('📥 Загрузка плейлиста...', 'warn');
    loadPlaylist();
    loadEPG();
    
    els.search.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = state.channels.filter(ch => ch.name.toLowerCase().includes(term));
      renderChannels(filtered);
    });

    document.addEventListener('keydown', (e) => {
      if (e.keyCode === 38 && state.focused > 0) {
        state.focused--;
        renderChannels(getFilteredChannels());
      } else if (e.keyCode === 40 && state.focused < state.channels.length - 1) {
        state.focused++;
        renderChannels(getFilteredChannels());
      } else if (e.keyCode === 13) {
        const ch = getFilteredChannels()[state.focused];
        if (ch) playChannel(ch);
      }
    });
  });

  async function loadPlaylist() {
    try {
      console.log('Loading playlist:', CONFIG.playlist);
      const response = await fetch(CONFIG.playlist);
      console.log('Response status:', response.status);
      
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }
      
      const text = await response.text();
      console.log('Playlist size:', text.length, 'bytes');
      
      state.channels = parseM3U(text);
      console.log('Parsed channels:', state.channels.length);
      
      els.chCount.textContent = state.channels.length;
      renderChannels(state.channels);
      updateStatus(`✅ Загружено ${state.channels.length} каналов`, 'ok');
      
      if (state.channels.length > 0) {
        setTimeout(() => {
          playChannel(state.channels[0]);
        }, 1000);
      }
      
    } catch (error) {
      console.error('Playlist error:', error);
      updateStatus('❌ Ошибка загрузки плейлиста', 'error');
      showError(
        'Не удалось загрузить плейлист',
        error.message,
        `URL: ${CONFIG.playlist}\nОшибка: ${error.message}\n\nВозможные причины:\n1. CORS блокировка\n2. Сервер недоступен\n3. Требуется VPN`
      );
    }
  }

  function parseM3U(text) {
    const channels = [];
    let current = {};
    
    for (let line of text.split('\n')) {
      line = line.trim();
      if (!line) continue;
      
      if (line.startsWith('#EXTINF:')) {
        const comma = line.lastIndexOf(',');
        current.name = comma > -1 ? line.substring(comma + 1).trim() : 'Без названия';
        const logo = line.match(/tvg-logo="([^"]*)"/i);
        const id = line.match(/tvg-id="([^"]*)"/i);
        if (logo) current.logo = logo[1];
        if (id) current.tvg_id = id[1];
      } else if (line.startsWith('http')) {
        current.url = line;
        channels.push({...current});
        current = {};
      }
    }
    return channels;
  }

  async function loadEPG() {
    try {
      console.log('Loading EPG:', CONFIG.epg);
      const response = await fetch(CONFIG.epg);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const buffer = await response.arrayBuffer();
      const decompressed = pako.inflate(buffer, {to: 'string'});
      state.epg = parseXMLTV(decompressed);
      
      els.epgStatus.textContent = `✅ ${Object.keys(state.epg).length}`;
      console.log('EPG loaded:', Object.keys(state.epg).length, 'channels');
    } catch (error) {
      console.error('EPG error:', error);
      els.epgStatus.textContent = '❌ Ошибка';
    }
  }

  function parseXMLTV(xml) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');
    const result = {};
    
    doc.querySelectorAll('channel').forEach(ch => {
      const id = ch.getAttribute('id');
      if (id) result[id] = { programs: [] };
    });
    
    doc.querySelectorAll('programme').forEach(prog => {
      const channelId = prog.getAttribute('channel');
      if (!result[channelId]) return;
      
      const start = parseDate(prog.getAttribute('start'));
      const stop = parseDate(prog.getAttribute('stop'));
      const title = prog.querySelector('title')?.textContent || '';
      
      result[channelId].programs.push({ start, stop, title });
    });
    
    return result;
  }

  function parseDate(dateStr) {
    if (!dateStr) return 0;
    const y = dateStr.slice(0,4), m = dateStr.slice(4,6)-1, d = dateStr.slice(6,8);
    const H = dateStr.slice(8,10), M = dateStr.slice(10,12);
    return new Date(y, m, d, H, M).getTime();
  }

  function playChannel(ch) {
    state.current = ch;
    console.log('Playing channel:', ch.name, 'URL:', ch.url);
    
    updateStatus(`▶ ${ch.name}`, 'ok');
    
    // Cleanup
    if (state.hls) {
      state.hls.destroy();
      state.hls = null;
    }
    els.video.pause();
    els.video.src = '';
    
    // Try to play
    setTimeout(() => {
      tryPlay(ch.url);
    }, 100);
    
    // Highlight
    document.querySelectorAll('.channel').forEach((el, i) => {
      el.classList.toggle('active', getFilteredChannels()[i] === ch);
    });
  }

  function tryPlay(url) {
    console.log('Trying to play:', url);
    
    // Check if HLS
    if (Hls.isSupported() && (url.includes('.m3u8') || !url.match(/\.(mp4|webm|ogg)$/))) {
      console.log('Using HLS.js');
      state.hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true,
        backBufferLength: 90
      });
      
      state.hls.loadSource(url);
      state.hls.attachMedia(els.video);
      
      state.hls.on(Hls.Events.MANIFEST_PARSED, () => {
        console.log('Manifest parsed, playing...');
        els.video.play().catch(err => {
          console.error('Play error:', err);
          showError('Автовоспроизведение заблокировано', 'Нажмите Play на видео');
        });
      });
      
      state.hls.on(Hls.Events.ERROR, (event, data) => {
        console.error('HLS error:', data);
        if (data.fatal) {
          showError(
            'Ошибка потока HLS',
            `Тип: ${data.type}\nДетали: ${data.details}`,
            `URL: ${url}\nПопробуйте другой канал`
          );
          updateStatus('❌ Ошибка потока', 'error');
        }
      });
      
    } else if (els.video.canPlayType('application/vnd.apple.mpegurl')) {
      console.log('Using native HLS');
      els.video.src = url;
      els.video.play().catch(err => console.error('Play error:', err));
    } else {
      console.log('Using direct playback');
      els.video.src = url;
      els.video.play().catch(err => {
        console.error('Play error:', err);
        showError('Не удалось воспроизвести', 'Нажмите Play вручную или попробуйте другой канал');
      });
    }
    
    els.video.onerror = () => {
      console.error('Video error:', els.video.error);
      showError(
        'Ошибка видео',
        `Код: ${els.video.error?.code}\nСообщение: ${els.video.error?.message}`,
        `URL: ${url}`
      );
    };
  }

  function getFilteredChannels() {
    const term = els.search.value.toLowerCase();
    return term 
      ? state.channels.filter(ch => ch.name.toLowerCase().includes(term))
      : state.channels;
  }

  function renderChannels(channels) {
    els.list.innerHTML = '';
    const filtered = getFilteredChannels();
    
    channels.forEach((ch, idx) => {
      const div = document.createElement('div');
      div.className = 'channel';
      if (idx === state.focused) div.classList.add('focused');
      
      const epgCh = ch.tvg_id ? state.epg[ch.tvg_id] : null;
      const now = Date.now();
      const currentProg = epgCh?.programs?.find(p => now >= p.start && now < p.stop);
      
      div.innerHTML = `
        <img class="channel-logo" src="${ch.logo || 'https://via.placeholder.com/40'}" onerror="this.style.display='none'">
        <div style="flex:1">
          <div class="channel-name">${ch.name}</div>
          ${currentProg ? `<div class="channel-epg">${currentProg.title}</div>` : ''}
        </div>
      `;
      
      div.onclick = () => {
        state.focused = idx;
        playChannel(ch);
      };
      
      els.list.appendChild(div);
    });
  }

  function updateStatus(msg, type) {
    const color = type === 'ok' ? 'status-ok' : type === 'error' ? 'status-error' : 'status-warn';
    els.status.innerHTML = `<div class="status-item ${color}">${msg}</div>`;
  }

  function showError(title, text, code) {
    els.errorTitle.textContent = title;
    els.errorText.textContent = text;
    els.errorCode.textContent = code || '';
    els.errorBox.classList.add('show');
    console.error('Error:', title, text, code);
  }

  function closeError() {
    els.errorBox.classList.remove('show');
  }

  async function testPlaylist() {
    updateStatus('🧪 Тестирование...', 'warn');
    try {
      const response = await fetch(CONFIG.playlist, { mode: 'cors' });
      console.log('Test response:', response.status, response.statusText);
      
      const text = await response.text();
      const channels = parseM3U(text);
      
      if (channels.length > 0) {
        const testUrl = channels[0].url;
        console.log('Testing first channel:', testUrl);
        
        const testResp = await fetch(testUrl, { method: 'HEAD', mode: 'cors' });
        console.log('Stream test:', testResp.status);
        
        alert(`✅ Плейлист работает!\nКаналов: ${channels.length}\nПервый канал: ${channels[0].name}\n\nЕсли видео не играет - проблема в формате потока или CORS`);
      }
      
      updateStatus('✅ Тест пройден', 'ok');
    } catch (error) {
      alert(`❌ Ошибка теста:\n${error.message}`);
      updateStatus('❌ Тест не пройден', 'error');
    }
  }

  function toggleDebug() {
    state.debug = !state.debug;
    els.debugInfo.style.display = state.debug ? 'block' : 'none';
    if (state.debug) {
      els.debugInfo.innerHTML = `
        Channels: ${state.channels.length}<br>
        EPG: ${Object.keys(state.epg).length}<br>
        HLS supported: ${Hls.isSupported()}<br>
        Video element: ${els.video ? 'OK' : 'ERROR'}<br>
        Current: ${state.current?.name || 'none'}
      `;
    }
  }
</script>
</body>
</html>
