<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>IPTV_FORK</title>
  <!-- Biblioteki -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0a; --panel: #151515; --text: #fff; --accent: #00d4ff;
      --error: #ff4444; --success: #00ff88; --focus: #ffd700;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* 🔹 ŠAPKA */
    .header {
      padding: 15px 24px; background: var(--panel);
      border-bottom: 2px solid var(--accent);
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 20px rgba(0, 212, 255, 0.1);
    }
    .title { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
    .stats { font-size: 13px; display: flex; gap: 20px; color: #888; }
    .stats span { color: var(--accent); font-weight: 600; }

    /* 🔹 OSNOVNOJ EKRAN */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* 🔹 BOKOVAYA PANEL */
    .sidebar {
      width: 400px; background: var(--panel);
      border-right: 1px solid #333; display: flex; flex-direction: column;
    }
    
    /* Poisk */
    .search-box { padding: 15px; border-bottom: 1px solid #333; }
    .search-box input {
      width: 100%; padding: 12px 15px;
      background: var(--bg); border: 1px solid #333; border-radius: 8px;
      color: white; font-size: 14px;
    }
    .search-box input:focus { border-color: var(--accent); }

    /* EPG Panel */
    .epg-panel {
      padding: 15px; background: #1a1a2e; border-bottom: 1px solid #333;
      font-size: 13px; display: none;
    }
    .epg-now { font-weight: 600; color: var(--accent); margin-bottom: 5px; }
    .epg-next { color: #888; margin-bottom: 8px; }
    .epg-progress { height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
    .epg-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s; }

    /* Spisok kanalov */
    .channel-list { flex: 1; overflow-y: auto; padding: 8px; }
    .channel-list::-webkit-scrollbar { width: 6px; }
    .channel-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    
    .channel {
      padding: 12px 15px; margin: 4px 0; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; gap: 12px;
      border: 2px solid transparent; transition: all 0.2s;
    }
    .channel:hover { background: #1e1e1e; transform: translateX(3px); }
    .channel.focused { border-color: var(--accent); background: rgba(0, 212, 255, 0.1); transform: translateX(5px); }
    .channel.active { border-color: var(--accent); background: rgba(0, 212, 255, 0.2); }
    
    .logo { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; background: #222; }
    .ch-name { font-size: 15px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ch-epg { font-size: 11px; color: #888; margin-top: 3px; }

    /* 🔹 PLEER */
    .player {
      flex: 1; background: #000; display: flex;
      align-items: center; justify-content: center; position: relative;
    }
    video { width: 100%; height: 100%; background: #000; }
    
    .overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent, rgba(0,0,0,0.7));
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    .player:hover .overlay { opacity: 1; }
    
    .player-info {
      position: absolute; top: 20px; left: 20px;
      background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 8px;
      backdrop-filter: blur(5px);
    }
    .player-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
    .player-desc { font-size: 13px; color: #ccc; }

    .controls {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 15px;
    }
    .btn {
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
      color: white; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; backdrop-filter: blur(5px);
    }
    .btn:hover { background: var(--accent); border-color: var(--accent); color: black; transform: scale(1.1); }

    .hint {
      position: absolute; bottom: 20px; right: 20px;
      font-size: 12px; color: #888; background: rgba(0,0,0,0.6);
      padding: 5px 10px; border-radius: 4px;
    }

    /* Soobšjenija */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--panel); border: 1px solid var(--accent);
      padding: 12px 24px; border-radius: 8px; font-size: 14px;
      opacity: 0; transition: all 0.3s; z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    
    .error-box {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(50,0,0,0.9); border: 2px solid var(--error);
      padding: 30px; border-radius: 10px; text-align: center; display: none;
    }
    .error-box.show { display: block; }
  </style>
</head>
<body>

  <div class="header">
    <div class="title">📺 IPTV_FORK</div>
    <div class="stats">
      <div>Kanalov: <span id="statCh">0</span></div>
      <div>EPG: <span id="statEpg">—</span></div>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="search-box">
        <input type="text" id="search" placeholder="🔍 Poisk kanalov...">
      </div>
      
      <div class="epg-panel" id="epgPanel">
        <div class="epg-now" id="epgNow">—</div>
        <div class="epg-next" id="epgNext">Dalee: —</div>
        <div class="epg-progress"><div class="epg-bar" id="epgBar"></div></div>
      </div>

      <div class="channel-list" id="list"></div>
    </div>

    <div class="player" id="player">
      <video id="video" controls autoplay playsinline></video>
      <div class="overlay"></div>
      
      <div class="player-info">
        <div class="player-title" id="pTitle">Vi berite kanal</div>
        <div class="player-desc" id="pDesc">—</div>
      </div>

      <div class="controls">
        <button class="btn" onclick="toggleMute()">🔊</button>
        <button class="btn" onclick="toggleFull()">⛶</button>
      </div>
      
      <div class="hint">↑↓ Navigacija | OK ▶ | Back ↩</div>

      <div class="error-box" id="errorBox">
        <h3 style="color:var(--error)">Ošibka potoka</h3>
        <p style="margin:10px 0; font-size:13px">Server ne podderživaet HTTPS ili potok nedostupen.</p>
        <button class="btn" onclick="closeError()" style="width:auto; height:auto; padding:10px 20px; border-radius:6px; margin-top:10px">Zakrit'</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  // 🔹 KONFIGURACIJA
  const CONFIG = {
    playlist: 'https://skaz.tv/play/82866376f',
    epg: 'https://skaztv.online/epg6.xml.gz' // Prinuditeljno HTTPS
  };

  let state = {
    channels: [],
    epg: {},
    focused: 0,
    current: null,
    hls: null
  };

  const els = {
    list: document.getElementById('list'),
    video: document.getElementById('video'),
    search: document.getElementById('search'),
    statCh: document.getElementById('statCh'),
    statEpg: document.getElementById('statEpg'),
    epgPanel: document.getElementById('epgPanel'),
    epgNow: document.getElementById('epgNow'),
    epgNext: document.getElementById('epgNext'),
    epgBar: document.getElementById('epgBar'),
    pTitle: document.getElementById('pTitle'),
    pDesc: document.getElementById('pDesc'),
    errorBox: document.getElementById('errorBox'),
    toast: document.getElementById('toast')
  };

  window.addEventListener('load', () => {
    loadPlaylist();
    loadEPG();
    
    // Poisk
    els.search.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      render(state.channels.filter(ch => ch.name.toLowerCase().includes(term)));
    });

    // Klaviatura
    document.addEventListener('keydown', (e) => {
      if (e.keyCode === 38 && state.focused > 0) { state.focused--; render(getFiltered()); }
      else if (e.keyCode === 40 && state.focused < state.channels.length - 1) { state.focused++; render(getFiltered()); }
      else if (e.keyCode === 13) { play(state.channels[state.focused]); }
    });
  });

  async function loadPlaylist() {
    try {
      const res = await fetch(CONFIG.playlist);
      const text = await res.text();
      state.channels = parseM3U(text);
      els.statCh.textContent = state.channels.length;
      render(state.channels);
      toast(`Zagruženo ${state.channels.length} kanalov`);
      if (state.channels.length > 0) setTimeout(() => play(state.channels[0]), 1000);
    } catch (err) {
      toast('❌ Ošibka plejlista');
    }
  }

  function parseM3U(text) {
    const chs = []; let cur = {};
    for (let line of text.split('\n')) {
      line = line.trim();
      if (!line) continue;
      if (line.startsWith('#EXTINF:')) {
        const comma = line.lastIndexOf(',');
        cur.name = comma > -1 ? line.substring(comma + 1).trim() : 'Bez nazvanija';
        const logo = line.match(/tvg-logo="([^"]*)"/i);
        const id = line.match(/tvg-id="([^"]*)"/i);
        if (logo) cur.logo = logo[1];
        if (id) cur.tvg_id = id[1];
      } else if (line.startsWith('http')) {
        cur.url = line;
        chs.push({...cur});
        cur = {};
      }
    }
    return chs;
  }

  async function loadEPG() {
    try {
      const res = await fetch(CONFIG.epg);
      const buffer = await res.arrayBuffer();
      const xml = pako.inflate(buffer, {to: 'string'});
      state.epg = parseXMLTV(xml);
      els.statEpg.textContent = `${Object.keys(state.epg).length}`;
    } catch (err) {
      els.statEpg.textContent = 'Ošibka';
    }
  }

  function parseXMLTV(xml) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const res = {};
    doc.querySelectorAll('channel').forEach(ch => {
      const id = ch.getAttribute('id');
      if (id) res[id] = { progs: [] };
    });
    doc.querySelectorAll('programme').forEach(p => {
      const id = p.getAttribute('channel');
      if (!res[id]) return;
      const start = parseDate(p.getAttribute('start'));
      const stop = parseDate(p.getAttribute('stop'));
      const title = p.querySelector('title')?.textContent || '';
      res[id].progs.push({ start, stop, title });
    });
    return res;
  }

  function parseDate(str) {
    if (!str) return 0;
    return new Date(str.slice(0,4), str.slice(4,6)-1, str.slice(6,8), str.slice(8,10), str.slice(10,12)).getTime();
  }

  function getFiltered() {
    const term = els.search.value.toLowerCase();
    return term ? state.channels.filter(ch => ch.name.toLowerCase().includes(term)) : state.channels;
  }

  function render(channels) {
    els.list.innerHTML = '';
    const filtered = getFiltered();
    
    channels.forEach((ch, i) => {
      const div = document.createElement('div');
      div.className = 'channel';
      if (filtered[i] === state.current) div.classList.add('active');
      if (filtered[i] === channels[state.focused]) div.classList.add('focused'); // Ispravlenie fokusa
      
      const epgCh = ch.tvg_id ? state.epg[ch.tvg_id] : null;
      const now = Date.now();
      const prog = epgCh?.progs?.find(p => now >= p.start && now < p.stop);
      
      div.innerHTML = `
        <img class="logo" src="${ch.logo||'https://via.placeholder.com/44'}" onerror="this.style.display='none'">
        <div style="flex:1;min-width:0">
          <div class="ch-name">${ch.name}</div>
          ${prog ? `<div class="ch-epg">${prog.title}</div>` : ''}
        </div>
      `;
      div.onclick = () => {
        state.focused = channels.indexOf(ch);
        play(ch);
      };
      els.list.appendChild(div);
    });
  }

  function play(ch) {
    state.current = ch;
    els.pTitle.textContent = ch.name;
    els.epgPanel.style.display = 'block';
    updateEPG();
    toast(`▶ ${ch.name}`);
    els.errorBox.classList.remove('show');

    // 🔧 PRINUDITELNIJ HTTPS
    let url = ch.url;
    if (url.startsWith('http://')) {
      console.log('Forcing HTTPS:', url);
      url = url.replace('http://', 'https://');
    }

    if (state.hls) { state.hls.destroy(); state.hls = null; }
    els.video.pause();
    els.video.src = '';

    setTimeout(() => {
      if (Hls.isSupported()) {
        state.hls = new Hls({ enableWorker: true });
        state.hls.loadSource(url);
        state.hls.attachMedia(els.video);
        state.hls.on(Hls.Events.MANIFEST_PARSED, () => els.video.play().catch(()=>{}));
        state.hls.on(Hls.Events.ERROR, (e, data) => {
          if (data.fatal) showError();
        });
      } else if (els.video.canPlayType('application/vnd.apple.mpegurl')) {
        els.video.src = url;
        els.video.play().catch(()=>{});
      } else {
        els.video.src = url;
        els.video.play().catch(()=>{});
      }
    }, 100);
  }

  function updateEPG() {
    if (!state.current) return;
    const epgCh = state.current.tvg_id ? state.epg[state.current.tvg_id] : null;
    if (!epgCh?.progs?.length) {
      els.epgNow.textContent = '—'; els.epgNext.textContent = 'Dalee: —';
      els.epgBar.style.width = '0%'; els.pDesc.textContent = '—';
      return;
    }
    const now = Date.now();
    const current = epgCh.progs.find(p => now >= p.start && now < p.stop);
    const next = epgCh.progs.find(p => p.start > now);
    
    if (current) {
      els.epgNow.textContent = current.title;
      els.epgNext.textContent = `Dalee: ${next?.title || '—'}`;
      els.pDesc.textContent = current.title;
      const dur = current.stop - current.start;
      const elap = now - current.start;
      els.epgBar.style.width = `${Math.min(100, (elap/dur)*100)}%`;
    }
  }

  function showError() {
    els.errorBox.classList.add('show');
    toast('❌ Ošibka potoka');
  }
  function closeError() { els.errorBox.classList.remove('show'); }

  function toggleMute() { els.video.muted = !els.video.muted; }
  function toggleFull() {
    if (!document.fullscreenElement) document.getElementById('player').requestFullscreen();
    else document.exitFullscreen();
  }
  function toast(msg) {
    els.toast.textContent = msg;
    els.toast.classList.add('show');
    setTimeout(() => els.toast.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
